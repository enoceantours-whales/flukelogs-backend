<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recent Sightings – Enocean Tours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Match the operator app — same ink palette so embed feels native */
    --ink:    #0a0c0e;
    --ink-2:  #0f1316;
    --ink-3:  #161b1f;
    --ink-4:  #1d2429;
    --hair:   rgba(255,255,255,0.08);
    --hair-2: rgba(255,255,255,0.14);
    --text:       #f4f6f7;
    --text-dim:   rgba(244,246,247,0.62);
    --text-faint: rgba(244,246,247,0.42);
    --teal:   #6fb1ac;
    --gold:   #c8a86b;
    --accent: #e6f0f0;
    /* Backward-compat aliases for unchanged JS */
    --bg: var(--ink);
    --surface: var(--ink-3);
    --border: var(--hair);
    --muted: var(--text-dim);
    --tag-bg: var(--ink-4);
  }
  html, body {
    background:
      radial-gradient(120% 60% at 50% 110%, rgba(64,108,118,.35) 0%, rgba(20,32,38,.35) 35%, transparent 70%),
      radial-gradient(80% 50% at 50% -10%, rgba(80,118,128,.12) 0%, transparent 60%),
      linear-gradient(180deg, #06090b 0%, #0a0e11 40%, #0d1418 70%, #0a1014 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .widget-wrap { max-width: 860px; margin: 0 auto; padding: 28px 18px 40px; }

  /* ── Editorial header (Fraunces title + monospace date) ── */
  .ed-header { margin-bottom: 22px; }
  .ed-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 38px;
    font-weight: 300;
    letter-spacing: -0.01em;
    line-height: 1.05;
    color: var(--text);
    margin: 0;
  }
  .ed-date {
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 0;
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ed-date-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    font-weight: 500;
  }

  /* ── What's out there now banner ── */
  .now-banner {
    background:
      radial-gradient(120% 100% at 0% 100%, rgba(111,177,172,.12) 0%, rgba(111,177,172,0) 60%),
      var(--ink-3);
    border: 1px solid rgba(111,177,172,.28);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 14px 28px rgba(0,0,0,.35);
  }
  .now-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 12px var(--teal); animation: nowPulse 2.4s ease-in-out infinite; flex-shrink: 0; }
  @keyframes nowPulse { 0%,100%{ opacity: 1; transform: scale(1); } 50%{ opacity: .55; transform: scale(.85); } }
  .now-content { flex: 1; }
  .now-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.26em; color: var(--teal); margin-bottom: 4px; }
  .now-species { font: 600 14px/1.4 "Open Sans", sans-serif; color: var(--text); }
  .now-meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.02em; }
  .now-cta {
    background: linear-gradient(180deg, #fff 0%, #e8edee 100%);
    color: #0a0c0e;
    border: 0;
    border-radius: 999px;
    padding: 10px 18px;
    font: 700 10px/1 "Open Sans", sans-serif;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 14px 28px rgba(0,0,0,.45);
    transition: transform .15s ease;
  }
  .now-cta:hover { transform: translateY(-1px); }

  /* ── Filter + Map grid (D on desktop, C on mobile) ─────────────── */
  .fm-grid {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 22px;
    align-items: start;
    margin-bottom: 24px;
    min-width: 0;
  }
  /* min-width:0 on grid children prevents the species rail's horizontal
     overflow (or any wide pin label) from blowing out the grid track
     wider than the viewport. */
  .fm-grid > * { min-width: 0; }
  .fm-grid .map-wrap { margin-bottom: 0; }
  /* When the operator has show_map_on_widget = false, the .map-wrap is
     removed from the DOM. Collapse the grid to a single column so the
     legend doesn't sit next to an empty slot. */
  .fm-grid.no-map { grid-template-columns: 1fr; }
  .fm-grid.no-map .legend-col { max-width: 480px; }

  /* ── Legend column (desktop / D) ────────────────────────────────── */
  .legend-head {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    font-weight: 500;
    padding-bottom: 6px;
  }
  .legend-list { border-top: 1px solid var(--hair); }
  .legend-row {
    position: relative;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--hair);
    color: var(--text-dim);
    padding: 10px 12px 10px 14px;
    font-family: "Open Sans", sans-serif;
    font-size: 12.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .legend-row:hover { background: rgba(255,255,255,.025); }
  .legend-row.is-active { color: var(--text); font-weight: 500; letter-spacing: 0; }
  .legend-row.is-dimmed { color: var(--text-faint); }
  .legend-row::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: transparent;
    transition: background .15s;
  }
  .legend-row.is-active::before { background: var(--text); }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.4);
    flex-shrink: 0;
    display: inline-block;
    box-sizing: border-box;
  }
  .legend-dot.is-split { background: linear-gradient(90deg, #ffffff 50%, #000000 50%); }
  .legend-dot.is-all { background: transparent; border: 1px dashed var(--text-faint); }
  .legend-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .legend-count {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10.5px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }
  .legend-row.is-active .legend-count { color: var(--text-dim); }
  .legend-status {
    margin-top: 12px;
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 12px;
    color: var(--text-faint);
    line-height: 1.45;
  }

  /* ── Mobile filter (segmented + rail / C) — hidden on desktop ─── */
  .filter-mobile { display: none; min-width: 0; }
  .seg-group {
    display: flex;
    border: 1px solid var(--hair);
    border-radius: 4px;
    overflow: hidden;
    width: 100%;
  }
  .seg-btn {
    flex: 1 1 0;
    min-width: 0;
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 10px 4px;
    font-family: "Open Sans", sans-serif;
    font-size: 11.5px;
    letter-spacing: 0.02em;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    transition: background .15s, color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .seg-btn + .seg-btn { border-left: 1px solid var(--hair); }
  .seg-btn.is-active { background: var(--ink-4); color: var(--text); }
  .seg-btn-count {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    color: var(--text-faint);
  }
  .seg-btn.is-active .seg-btn-count { color: var(--text-dim); }

  .rail-wrap { position: relative; margin-top: 10px; min-width: 0; }
  .species-rail {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    scroll-snap-type: x proximity;
  }
  .species-rail::-webkit-scrollbar { display: none; }
  .rail-fade {
    position: absolute;
    right: 0; top: 0; bottom: 4px;
    width: 28px;
    pointer-events: none;
    background: linear-gradient(90deg, transparent, var(--ink));
  }
  .rail-pill {
    flex: 0 0 auto;
    background: transparent;
    border: 1px solid var(--hair);
    color: var(--text-dim);
    padding: 5px 11px;
    border-radius: 999px;
    font-family: "Open Sans", sans-serif;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.02em;
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
    scroll-snap-align: start;
    -webkit-tap-highlight-color: transparent;
  }
  .rail-pill.is-active { background: var(--ink-4); border-color: var(--hair-2); color: var(--text); }
  .rail-pill .legend-dot { width: 6px; height: 6px; }
  .rail-pill-count {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 9.5px;
    color: var(--text-faint);
  }

  /* ── Responsive: < 720px → swap to mobile pattern ─────────────── */
  @media (max-width: 720px) {
    .widget-wrap { padding: 20px 14px 32px; }
    .fm-grid {
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .legend-col { display: none; }
    .filter-mobile { display: block; }
    .ed-title { font-size: 30px; }
  }

  .map-wrap {
    border: 1px solid var(--hair);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 24px;
    height: 380px;
    position: relative;
    box-shadow: 0 14px 28px rgba(0,0,0,.35);
  }
  #sightings-map { width: 100%; height: 100%; background: #0a1628; }
  .leaflet-tile { filter: brightness(0.92) contrast(1.05); }
  .leaflet-container { background: #0a1628 !important; font-family: "Open Sans", sans-serif !important; }
  .leaflet-popup-content-wrapper { background: var(--ink-3); color: var(--text); border: 1px solid var(--hair-2); border-radius: 10px; box-shadow: 0 14px 28px rgba(0,0,0,.5); }
  .leaflet-popup-tip { background: var(--ink-3); }
  .leaflet-popup-close-button { color: var(--text-dim) !important; }

  .map-hint {
    position: absolute; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.65);
    color: var(--text-dim);
    font-size: 9px;
    padding: 5px 10px;
    border-radius: 999px;
    z-index: 1000;
    pointer-events: none;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .feed-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .feed-header h3 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.28em; color: var(--text-dim); }
  .feed-count { font-size: 10px; color: var(--text-faint); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; }

  .trip-card {
    background: var(--ink-3);
    border: 1px solid var(--hair);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color .15s, transform .15s;
    box-shadow: 0 8px 18px rgba(0,0,0,.25);
  }
  .trip-card.selected { border-color: var(--hair-2); }
  .trip-date-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--hair);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
    transition: background .1s;
  }
  .trip-date-header:hover { background: rgba(255,255,255,0.025); }
  .trip-date-header.active-trip { background: rgba(255,255,255,0.04); }
  .trip-date-label { font: 600 13px/1 "Open Sans", sans-serif; color: var(--text); display: flex; align-items: center; gap: 8px; letter-spacing: 0.005em; }
  .active-indicator { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 8px var(--teal); display: none; }
  .trip-date-header.active-trip .active-indicator { display: inline-block; }
  .trip-date-right { display: flex; align-items: center; gap: 12px; }
  .trip-summary { font-size: 10px; color: var(--text-faint); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; }
  .trip-share-btn,
  .trip-replay-btn {
    appearance: none;
    background: transparent;
    border: 1px solid var(--hair);
    color: var(--text-dim);
    width: 30px; height: 30px;
    border-radius: 50%;
    padding: 0; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color .15s, border-color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .trip-share-btn:hover,
  .trip-replay-btn:hover { color: var(--text); border-color: var(--hair-2); background: rgba(255,255,255,.05); }
  .trip-share-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .trip-replay-btn svg { width: 11px; height: 11px; fill: currentColor; }

  /* Toast for the desktop-Firefox clipboard fallback (and any future
     non-Share-API browser). Fades in/out via the .show class. */
  .share-toast {
    position: fixed;
    bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--ink-3);
    border: 1px solid var(--hair-2);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    font: 500 12px/1 "Open Sans", sans-serif;
    letter-spacing: 0.04em;
    box-shadow: 0 12px 32px rgba(0,0,0,.5);
    opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 9999;
  }
  .share-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .trip-sightings { padding: 4px 0; }

  .sighting-row {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 16px;
    border-bottom: 1px solid var(--hair);
    cursor: pointer;
    transition: background .1s;
  }
  .sighting-row:last-child { border-bottom: none; }
  .sighting-row:hover { background: rgba(255,255,255,0.025); }
  .sighting-row.active { background: rgba(255,255,255,0.04); border-left: 2px solid var(--teal); padding-left: 14px; }
  .sighting-row .species-icon { font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; }
  .sighting-row .species-name { flex: 1; font: 500 13px/1.3 "Open Sans", sans-serif; color: var(--text); letter-spacing: 0.005em; }
  .sighting-row .species-count { font: 600 12px/1 "Open Sans", sans-serif; color: var(--text); letter-spacing: 0.04em; }
  .trip-card.hidden { display: none; }

  /* ── Captain audio player — custom waveform ───────────────── */
  .trip-audio {
    padding: 12px 16px 14px;
    border-bottom: 1px solid var(--hair);
    background: linear-gradient(180deg, rgba(111,177,172,.04) 0%, transparent 100%);
  }
  .audio-meta {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.26em;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .audio-meta .audio-meta-icon { color: var(--teal); font-size: 11px; }
  .audio-player {
    display: flex; align-items: center; gap: 10px;
    background: var(--ink-4);
    border: 1px solid var(--hair);
    border-radius: 999px;
    padding: 6px 14px 6px 6px;
  }
  .audio-play {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 0;
    background: linear-gradient(180deg, #fff 0%, #e8edee 100%);
    color: #0a0c0e;
    cursor: pointer;
    display: grid; place-items: center;
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 6px 14px rgba(0,0,0,.4);
    transition: transform .12s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .audio-play:hover { transform: scale(1.05); }
  .audio-play:active { transform: scale(0.96); }
  .audio-play svg { width: 12px; height: 12px; fill: currentColor; }
  .audio-waveform {
    flex: 1;
    display: flex; align-items: center; gap: 2px;
    height: 32px;
    cursor: pointer;
    min-width: 60px;
  }
  .audio-waveform .bar {
    flex: 1;
    min-width: 2px;
    background: var(--text-faint);
    border-radius: 2px;
    transition: background .12s ease;
  }
  .audio-waveform .bar.played { background: var(--teal); box-shadow: 0 0 4px rgba(111,177,172,.4); }
  .audio-time {
    flex-shrink: 0;
    font: 600 11px/1 "Open Sans", sans-serif;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    min-width: 64px;
    text-align: right;
  }

  .state-msg { text-align: center; color: var(--text-faint); padding: 40px 0; font-size: 12px; letter-spacing: 0.05em; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--hair); border-top-color: var(--teal); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cta-strip {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--hair);
    display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .cta-text { font-size: 12px; color: var(--text-dim); letter-spacing: 0.02em; }
  .cta-btn {
    background: linear-gradient(180deg, #fff 0%, #e8edee 100%);
    color: #0a0c0e;
    border: 0;
    border-radius: 999px;
    padding: 12px 22px;
    font: 700 11px/1 "Open Sans", sans-serif;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 14px 28px rgba(0,0,0,.45);
    transition: transform .15s ease;
  }
  .cta-btn:hover { transform: translateY(-1px); }

  @media (prefers-reduced-motion: reduce) {
    .now-dot, .spinner, .audio-waveform .bar { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="widget-wrap">

  <!-- Editorial header — Fraunces title + monospace date below -->
  <header class="ed-header">
    <h1 class="ed-title">Sightings Log</h1>
    <div class="ed-date">
      <span class="ed-date-label">Last Updated</span>
      <span id="status-text">&mdash;</span>
    </div>
  </header>

  <!-- What's out there now -->
  <div class="now-banner" id="now-banner" style="display:none;">
    <div class="now-dot"></div>
    <div class="now-content">
      <div class="now-label">What's out there right now</div>
      <div class="now-species" id="now-species"></div>
      <div class="now-meta" id="now-meta"></div>
    </div>
    <a class="now-cta" href="https://enoceantours.com/tours" target="_blank">Book Now</a>
  </div>

  <!-- Filter + Map: D · legend column on desktop, C · segmented + rail on mobile -->
  <div class="fm-grid">
    <aside class="legend-col" id="legend-col">
      <div class="legend-head">Species &mdash; count</div>
      <div class="legend-list" id="legend-list"></div>
      <div class="legend-status" id="legend-status"></div>
    </aside>

    <div class="filter-mobile" id="filter-mobile">
      <div class="seg-group" id="seg-group"></div>
      <div class="rail-wrap">
        <div class="species-rail" id="species-rail"></div>
        <div class="rail-fade"></div>
      </div>
    </div>

    <div class="map-wrap">
      <div id="sightings-map"></div>
      <div class="map-hint" id="map-hint">Click a trip to see its pins</div>
    </div>
  </div>

  <div class="feed-header">
    <h3>Trip Log</h3>
    <div class="feed-count" id="feed-count"></div>
  </div>
  <div id="feed-list">
    <div class="state-msg"><div class="spinner"></div>Fetching sightings&hellip;</div>
  </div>

  <div class="cta-strip">
    <div class="cta-text">Spots are limited to 6 guests. Book early.</div>
    <a class="cta-btn" href="https://enoceantours.com/tours" target="_blank">Book a Trip &rarr;</a>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://czotpzjtnuukoxscjduj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6b3Rwemp0bnV1a294c2NqZHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTIzNDcsImV4cCI6MjA5MzU4ODM0N30.o1sAH23f-AgLmRhBiCptySJkEV3nnQqNxmldA6evx9c';
const TABLE = 'sightings';
const FEED_LIMIT = 100;

// Operator scope is resolved server-side from ?op=<slug> and injected here.
// If id is null, the slug didn't match any operator row — show an empty
// state instead of falling through to an unscoped query (which would mix
// every operator's sightings into the embed).
const OP = (typeof window !== 'undefined' && window.__OP_CONFIG) || {};
const OPERATOR_ID = OP.id || null;
const BOOK_URL = 'https://enoceantours.com/tours';

const WHALE_SPECIES = ['Humpback Whale','Blue Whale','Gray Whale','Fin Whale','Minke Whale','Orca','Transient Orcas','Offshore Orcas','Resident Orcas','Sperm Whale'];
const DOLPHIN_SPECIES = ['Common Dolphin','Pacific White-sided Dolphin',"Risso's Dolphin",'Bottlenose Dolphin','Coastal Bottlenose Dolphin','Northern Right Whale Dolphin',"Dall's Porpoise",'Harbor Porpoise'];
const BIRD_SPECIES = ['Black-footed Albatross'];

// Buckets a species into one of the four segmented-control groups. Anything
// not whale/dolphin/bird (sharks, otters, seals, mola mola, etc.) falls into
// "other" — the segmented control hides the group when its count is zero.
function speciesKind(name) {
  if (WHALE_SPECIES.includes(name)) return 'whale';
  if (DOLPHIN_SPECIES.includes(name)) return 'dolphin';
  if (BIRD_SPECIES.includes(name)) return 'bird';
  return 'other';
}

// Active segmented-group filter for the mobile rail. Independent of
// activeFilter (species pin) so the user can browse one group at a time
// without committing to a specific species.
let activeKind = 'all';

// Pin colors — your spec + my picks for the rest
const SPECIES_META = {
  'Orca':                          { icon: '🐋', color: '#ffffff', borderColor: '#000000', isSplit: true },
  'Transient Orcas':               { icon: '🐋', color: '#ffffff', borderColor: '#000000', isSplit: true },

// ── State ────────────────────────────────────────────────────────────────────
let allData = [];
let tripAudioByTrip = new Map(); // trip_id -> { audio_url, duration_seconds }
let activeFilter = null;   // species name or null
let activeTripKey = null;  // selected trip_id or null
const markers = [];

// ── Map ──────────────────────────────────────────────────────────────────────
// Per-operator: some operators don't want to publish GPS pins. When
// show_map_on_widget is false, we skip Leaflet entirely and remove the
// .map-wrap element so the feed slides up.

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', { maxZoom: 16, opacity: 0.7 }).addTo(map);

// Custom split circle marker for Orca (black/white)
function createOrcaIcon(lat, lng) {
  const size = 16;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${size/2 - 1}" fill="white" stroke="#000" stroke-width="1.5"/>
    <path d="M${size/2},1 A${size/2-1},${size/2-1} 0 0,1 ${size/2},${size-1} Z" fill="black"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2],
  });
}

function refreshMarkers() {
  if (!map) return;
  markers.forEach(m => map.removeLayer(m));
  markers.length = 0;

  // Trip-date selection still hard-filters, but species filtering now dims
  // non-matching pins instead of hiding them — keeps geographic context
  // intact while highlighting the species the user picked (per design D).
  const dataToShow = activeTripKey
    ? allData.filter(s => s.trip_id === activeTripKey)
    : allData;

  dataToShow.forEach(s => {
    if (!s.lat || !s.lng) return;
    const meta = sm(s.species);
    const isActiveSpecies = !activeFilter || s.species === activeFilter;
    const dimOpacity = 0.18;
    let m;

    if (meta.isSplit) {
      m = L.marker([+s.lat, +s.lng], { icon: createOrcaIcon(), opacity: isActiveSpecies ? 1 : dimOpacity });
    } else {
      m = L.circleMarker([+s.lat, +s.lng], {
        radius: isActiveSpecies && activeFilter ? 8.5 : 7,
        fillColor: meta.color,
        color: meta.borderColor || '#000',
        weight: isActiveSpecies && activeFilter ? 2 : 1.5,
        fillOpacity: isActiveSpecies ? 0.95 : dimOpacity,
        opacity: isActiveSpecies ? 1 : dimOpacity,
      });
    }

    const depthLabel = fmtDepth(s.depth_meters);
    const depthLine = depthLabel ? `Depth: <strong>${depthLabel}</strong><br>` : '';
    m.bindPopup(`<div style="font-family:Inter,sans-serif;font-size:12px;line-height:1.6;">
      <strong style="font-size:13px;">${meta.icon} ${s.species || 'Unknown'}</strong><br>
      Count: <strong>${s.count ?? '—'}</strong><br>
      ${depthLine}${fmtDate(s.trip_date)}
    </div>`);
    m._tripKey = s.trip_id;
    m._species = s.species;
    m.addTo(map);
    markers.push(m);
  });

  // Update hint
  const hint = document.getElementById('map-hint');
  if (activeTripKey) {
    const sel = allData.find(s => s.trip_id === activeTripKey) || {};
    hint.textContent = `Showing ${fmtDateShort(sel.trip_date)}${sel.trip_part ? ' ' + sel.trip_part.toLowerCase() : ''} — click map to deselect`;
  } else if (activeFilter) {
    hint.textContent = `Highlighting: ${activeFilter}`;
  } else {
    hint.textContent = 'Click a trip to see its pins';
  }
}

// Click map background to deselect trip (only registered when the map exists)
if (map) {
  map.on('click', () => {
    if (activeTripKey) {
      activeTripKey = null;
      refreshMarkers();
      document.querySelectorAll('.trip-date-header').forEach(h => h.classList.remove('active-trip'));
      document.querySelectorAll('.trip-card').forEach(c => c.classList.remove('selected', 'hidden'));
    }
  });
}

// ── Data ─────────────────────────────────────────────────────────────────────
async function fetchSightings() {
  const url = `${SUPABASE_URL}/rest/v1/${TABLE}?operator_id=eq.${OPERATOR_ID}&select=trip_id,trip_part,trip_date,sighting_time,species,count,lat,lng,depth_meters,created_at&order=trip_date.desc,created_at.desc&limit=${FEED_LIMIT}`;
  const res = await fetch(url, { headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` } });
  if (!res.ok) throw new Error(`Supabase ${res.status}`);
  return res.json();
}

// Captain audio notes per trip. Public read via the same anon key.
// Returns { trip_id -> { audio_url, duration_seconds } } so render code
// can do a synchronous lookup per trip card.
async function fetchTripAudio() {
  try {
    const url = `${SUPABASE_URL}/rest/v1/trip_audio?operator_id=eq.${OPERATOR_ID}&select=trip_id,audio_url,duration_seconds,play_count&order=trip_date.desc&limit=${FEED_LIMIT}`;
    const res = await fetch(url, { headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` } });
    if (!res.ok) return new Map();
    const rows = await res.json();
    return new Map(rows.filter(r => r.trip_id).map(r => [r.trip_id, r]));
  } catch (e) { return new Map(); }
}

// ── Custom audio player with decorative waveform ────────────────────────────
// We render 36 vertical bars per player. Heights are PSEUDO-RANDOM but
// derived from a hash of the audio URL, so the same recording always shows
// the same waveform — feels deterministic without doing real audio decoding.
// As the audio plays, bars to the left of the playhead fill teal.
//
// Kept self-contained: one play-pause toggle, one Audio element per player,
// click-to-seek on the waveform, automatic pause-others when a new player
// starts. No dependencies, no library.

const WAVE_BARS = 36;
const SVG_PLAY  = '<svg viewBox="0 0 24 24"><path d="M7 4l13 8L7 20V4z"/></svg>';
const SVG_PAUSE = '<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';

function fmtAudioTime(sec) {
  const s = Math.max(0, Math.floor(sec || 0));
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

// Cheap deterministic PRNG seeded from a string. Returns a function that
// yields successive pseudo-random floats in [0, 1).
function seededRng(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return () => {
    h ^= h << 13; h >>>= 0;
    h ^= h >> 17; h >>>= 0;
    h ^= h << 5;  h >>>= 0;
    return (h >>> 0) / 4294967296;
  };
}

function renderAudioPlayer(audio) {
  const dur = audio.duration_seconds || 0;
  const rng = seededRng(audio.audio_url);
  // Bias toward varied but plausible-looking waveform heights (peaks + valleys)
  const bars = [];
  for (let i = 0; i < WAVE_BARS; i++) {
    // Weighted mix of two random values + an envelope so middle bars trend
    // taller — looks more like real captain narration than uniform noise.
    const env = 0.55 + 0.45 * Math.sin((i / WAVE_BARS) * Math.PI);
    const h = Math.round((rng() * 0.6 + rng() * 0.4) * 60 * env + 22);
    bars.push(`<span class="bar" style="height:${h}%"></span>`);
  }
  const plays = parseInt(audio.play_count, 10) || 0;
  const playsText = plays > 0 ? ' · ' + plays + ' play' + (plays === 1 ? '' : 's') : '';
  return `
    <div class="trip-audio">
      <div class="audio-meta"><span class="audio-meta-icon">●</span>Captain's notes from this trip${dur ? ' · ' + fmtAudioTime(dur) : ''}<span class="audio-plays">${playsText}</span></div>
      <div class="audio-player" data-src="${audio.audio_url}" data-dur="${dur}" data-trip="${audio.trip_id || ''}" data-plays="${plays}">
        <button class="audio-play" type="button" aria-label="Play">${SVG_PLAY}</button>
        <div class="audio-waveform">${bars.join('')}</div>
        <span class="audio-time">${dur ? '0:00 / ' + fmtAudioTime(dur) : '0:00'}</span>
      </div>
    </div>`;
}

// Count one listen the first time a visitor plays a given note this page
// load. Optimistically bumps the visible count, then fires the atomic
// increment RPC — failures are silent, it's a vanity counter.
function recordAudioPlay(player) {
  if (!player || player.dataset.counted) return;
  const tripId = player.dataset.trip;
  if (!tripId) return;
  player.dataset.counted = '1';
  const next = (parseInt(player.dataset.plays, 10) || 0) + 1;
  player.dataset.plays = String(next);
  const wrap = player.closest('.trip-audio');
  const label = wrap && wrap.querySelector('.audio-plays');
  if (label) label.textContent = ' · ' + next + ' play' + (next === 1 ? '' : 's');
  fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_audio_play`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ tid: tripId }),
  }).catch(() => { /* vanity counter — ignore network errors */ });
}

// Wires up every .audio-player on the page. Call after renderFeed paints the
// markup. Idempotent — replays are fine; the dataset.bound flag prevents
// double-binding the same element.
const _audioRegistry = []; // [{ player, audio }] so we can pause-others on play
function bindAudioPlayers(root) {
  root.querySelectorAll('.audio-player').forEach(player => {
    if (player.dataset.bound) return;
    player.dataset.bound = '1';

    const playBtn  = player.querySelector('.audio-play');
    const waveform = player.querySelector('.audio-waveform');
    const timeEl   = player.querySelector('.audio-time');
    const bars     = Array.from(waveform.querySelectorAll('.bar'));
    const src      = player.dataset.src;
    const dur      = parseFloat(player.dataset.dur) || 0;

    const audio = new Audio();
    audio.preload = 'metadata';
    audio.src = src;

    _audioRegistry.push({ player, audio });

    function paint(currentTime, totalTime) {
      const pct = totalTime > 0 ? Math.min(1, currentTime / totalTime) : 0;
      const filled = Math.floor(pct * bars.length);
      bars.forEach((b, i) => b.classList.toggle('played', i < filled));
      timeEl.textContent = totalTime > 0
        ? fmtAudioTime(currentTime) + ' / ' + fmtAudioTime(totalTime)
        : fmtAudioTime(currentTime);
    }
    paint(0, dur || audio.duration || 0);

    audio.addEventListener('timeupdate', () => paint(audio.currentTime, audio.duration || dur));
    audio.addEventListener('loadedmetadata', () => paint(audio.currentTime, audio.duration || dur));
    audio.addEventListener('ended', () => {
      playBtn.innerHTML = SVG_PLAY;
      playBtn.setAttribute('aria-label', 'Play');
      paint(0, audio.duration || dur);
    });

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        // Pause every other player first so two trip audios can't overlap
        _audioRegistry.forEach(({ audio: a, player: p }) => {
          if (a !== audio && !a.paused) {
            a.pause();
            const otherBtn = p.querySelector('.audio-play');
            if (otherBtn) { otherBtn.innerHTML = SVG_PLAY; otherBtn.setAttribute('aria-label', 'Play'); }
          }
        });
        audio.play().then(() => {
          playBtn.innerHTML = SVG_PAUSE;
          playBtn.setAttribute('aria-label', 'Pause');
          recordAudioPlay(player);
        }).catch(() => { /* autoplay block / decode failure — ignore */ });
      } else {
        audio.pause();
        playBtn.innerHTML = SVG_PLAY;
        playBtn.setAttribute('aria-label', 'Play');
      }
    });

    // Click-to-seek on the waveform
    waveform.addEventListener('click', (e) => {
      const rect = waveform.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const total = audio.duration || dur || 0;
      if (total > 0) audio.currentTime = pct * total;
    });
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}
function fmtDateShort(d) {
  if (!d) return '—';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function daysBetween(d) {
  const diff = Math.floor((Date.now() - new Date(d + 'T12:00:00')) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'yesterday';
  return `${diff} days ago`;
}
function fmtDepth(m) {
  if (m == null) return null;
  const v = Number(m);
  if (!Number.isFinite(v) || v <= 0) return null;
  return v < 1000 ? `${Math.round(v)}m` : `${(v / 1000).toFixed(1)}km`;
}

// Group sightings into trips by trip_id (a row with no trip_id — pre-0013
// data — falls back to its date as the key). Returns [tripKey, sightings]
// pairs, newest trip first: by date, then created_at so a day's later
// trip sorts above its earlier one.
function groupByTrip(data) {
  const trips = {};
  data.forEach(s => {
    const key = s.trip_id || (s.trip_date || '').slice(0, 10);
    if (!trips[key]) trips[key] = [];
    trips[key].push(s);
  });
  return Object.entries(trips).sort((a, b) => {
    const da = a[1][0].trip_date || '', db = b[1][0].trip_date || '';
    if (da !== db) return db.localeCompare(da);
    return String(b[1][0].created_at || '').localeCompare(String(a[1][0].created_at || ''));
  });
}

function tallyBySpecies(sightings) {
  const tally = {};
  sightings.forEach(s => {
    if (!tally[s.species]) tally[s.species] = { count: 0, lat: s.lat, lng: s.lng };
    tally[s.species].count += parseInt(s.count) || 1;
    if (s.lat && s.lng) { tally[s.species].lat = s.lat; tally[s.species].lng = s.lng; }
  });
  return Object.entries(tally).sort((a, b) => b[1].count - a[1].count);
}

// ── Now banner ────────────────────────────────────────────────────────────────
function renderNowBanner(data) {
  if (!data.length) return;
  const trips = groupByTrip(data);
  const latestSightings = trips[0][1];
  const latestDate = (latestSightings[0].trip_date || '').slice(0, 10);
  const tallied = tallyBySpecies(latestSightings);
  const speciesNames = tallied.map(([name]) => name);
  const totalAnimals = latestSightings.reduce((sum, s) => sum + (parseInt(s.count) || 1), 0);

  // Format species list nicely
  let speciesText;
  if (speciesNames.length === 1) speciesText = speciesNames[0];
  else if (speciesNames.length === 2) speciesText = speciesNames.join(' & ');
  else speciesText = speciesNames.slice(0, -1).join(', ') + ' & ' + speciesNames.slice(-1);

  document.getElementById('now-species').textContent = speciesText;
  document.getElementById('now-meta').textContent = `${totalAnimals} animals spotted · ${daysBetween(latestDate)}`;
  document.getElementById('now-banner').style.display = 'flex';
}

// Format a YYYY-MM-DD trip_date as "06 · MAY · 2026".
function fmtDottedDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T12:00:00');
  if (isNaN(d.getTime())) return '—';
  const day = String(d.getDate()).padStart(2, '0');
  const month = d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
  return `${day} · ${month} · ${d.getFullYear()}`;
}

// ── Group + species aggregation ───────────────────────────────────────────────
function aggregateBySpecies(data) {
  const map = new Map();
  data.forEach(s => {
    if (!s.species) return;
    const c = parseInt(s.count) || 1;
    const prev = map.get(s.species) || 0;
    map.set(s.species, prev + c);
  });
  return [...map.entries()]
    .map(([name, count]) => ({ name, count, kind: speciesKind(name), meta: sm(name) }))
    .sort((a, b) => b.count - a.count);
}

function totalsByKind(species) {
  const t = { whale: 0, dolphin: 0, bird: 0, other: 0 };
  species.forEach(s => { t[s.kind] += s.count; });
  return t;
}

// Renders a small colored dot. Split species (orcas) get a half-and-half
// dot so the legend reads as a true map legend.
function legendDotHTML(spec, extraClass = '') {
  if (!spec) return `<span class="legend-dot is-all ${extraClass}"></span>`;
  if (spec.meta && spec.meta.isSplit) return `<span class="legend-dot is-split ${extraClass}"></span>`;
  return `<span class="legend-dot ${extraClass}" style="background:${spec.meta.color};"></span>`;
}

// ── Desktop · D — legend column ──────────────────────────────────────────────
function renderLegend(data) {
  const list = document.getElementById('legend-list');
  if (!list) return;
  const species = aggregateBySpecies(data);
  const total = species.reduce((s, x) => s + x.count, 0);

  const rows = [];
  rows.push(`
    <button class="legend-row" type="button" data-species="all">
      <span class="legend-dot is-all"></span>
      <span class="legend-name">All species</span>
      <span class="legend-count">${total}</span>
    </button>`);
  species.forEach(spec => {
    rows.push(`
      <button class="legend-row" type="button" data-species="${spec.name.replace(/"/g, '&quot;')}">
        ${legendDotHTML(spec)}
        <span class="legend-name" title="${spec.name.replace(/"/g, '&quot;')}">${spec.name}</span>
        <span class="legend-count">${spec.count}</span>
      </button>`);
  });
  list.innerHTML = rows.join('');

  list.querySelectorAll('.legend-row').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.species;
      const next = val === 'all' ? null : (activeFilter === val ? null : val);
      setActiveFilter(next);
    });
  });

  syncFilterUI();
}

// ── Mobile · C — segmented group + horizontal species rail ──────────────────
function renderSegmentedRail(data) {
  const species = aggregateBySpecies(data);
  const totals = totalsByKind(species);
  const total = species.reduce((s, x) => s + x.count, 0);

  const segs = [
    { id: 'all',     label: 'All',      count: total },
    { id: 'whale',   label: 'Whales',   count: totals.whale },
    { id: 'dolphin', label: 'Dolphins', count: totals.dolphin },
    { id: 'bird',    label: 'Birds',    count: totals.bird },
    { id: 'other',   label: 'Other',    count: totals.other },
  ].filter(g => g.id === 'all' || g.count > 0);

  const seg = document.getElementById('seg-group');
  if (seg) {
    seg.innerHTML = segs.map(g => `
      <button class="seg-btn" type="button" data-kind="${g.id}">
        <span>${g.label}</span>
        <span class="seg-btn-count">${g.count}</span>
      </button>`).join('');
    seg.querySelectorAll('.seg-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeKind = btn.dataset.kind;
        // Switching groups clears the species pin so the rail starts at "All"
        setActiveFilter(null);
      });
    });
  }

  renderRailForKind(species);
}

function renderRailForKind(speciesPrecomputed) {
  const rail = document.getElementById('species-rail');
  if (!rail) return;
  const all = speciesPrecomputed || aggregateBySpecies(allData);
  const visible = activeKind === 'all' ? all : all.filter(s => s.kind === activeKind);

  const pills = [];
  pills.push(`
    <button class="rail-pill" type="button" data-species="all">All</button>`);
  visible.forEach(spec => {
    pills.push(`
      <button class="rail-pill" type="button" data-species="${spec.name.replace(/"/g, '&quot;')}">
        ${legendDotHTML(spec)}
        ${spec.name}
        <span class="rail-pill-count">${spec.count}</span>
      </button>`);
  });
  rail.innerHTML = pills.join('');

  rail.querySelectorAll('.rail-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.species;
      const next = val === 'all' ? null : (activeFilter === val ? null : val);
      setActiveFilter(next);
    });
  });

  syncFilterUI();
}

// Updates the active visual state on the legend rows, segmented group, and
// rail pills — called whenever activeFilter or activeKind changes. Keeps
// every filter surface in sync so user mental model never breaks.
function syncFilterUI() {
  // Legend rows
  document.querySelectorAll('#legend-list .legend-row').forEach(row => {
    const sp = row.dataset.species;
    const isAll = sp === 'all';
    const isActive = (activeFilter === null && isAll) || sp === activeFilter;
    const isDimmed = activeFilter !== null && !isActive;
    row.classList.toggle('is-active', isActive);
    row.classList.toggle('is-dimmed', isDimmed);
  });

  // Segmented group
  document.querySelectorAll('#seg-group .seg-btn').forEach(btn => {
    btn.classList.toggle('is-active', btn.dataset.kind === activeKind);
  });

  // Rail pills
  document.querySelectorAll('#species-rail .rail-pill').forEach(btn => {
    const sp = btn.dataset.species;
    const isAll = sp === 'all';
    const isActive = (activeFilter === null && isAll) || sp === activeFilter;
    btn.classList.toggle('is-active', isActive);
  });

  // Legend italic status line
  const status = document.getElementById('legend-status');
  if (status) {
    const totalPins = allData.filter(s => s.lat && s.lng).length;
    if (activeFilter) {
      const n = allData.filter(s => s.species === activeFilter && s.lat && s.lng).length;
      status.textContent = `Highlighting ${n} ${activeFilter} pin${n === 1 ? '' : 's'}.`;
    } else {
      status.textContent = `Showing all ${totalPins} pin${totalPins === 1 ? '' : 's'}.`;
    }
  }
}

// Central click handler — sets the species filter (or clears it), then
// re-syncs every surface that reflects it (map opacity, legend rows,
// rail pills, trip-log filter).
function setActiveFilter(speciesOrNull) {
  activeFilter = speciesOrNull;
  // Selecting a species also clears any active trip-date selection so the
  // user is never looking at two filters at once.
  activeTripKey = null;
  document.querySelectorAll('.trip-date-header').forEach(h => h.classList.remove('active-trip'));
  // If a species got selected from outside the current segmented group,
  // jump to its group so the rail keeps the pill in view.
  if (speciesOrNull) {
    const kind = speciesKind(speciesOrNull);
    if (activeKind !== 'all' && activeKind !== kind) {
      activeKind = kind;
      renderRailForKind();
    }
  } else {
    renderRailForKind();
  }
  refreshMarkers();
  applyFeedFilter();
  syncFilterUI();
}

function applyFeedFilter() {
  document.querySelectorAll('.trip-card').forEach(card => {
    if (!activeFilter) { card.classList.remove('hidden'); return; }
    const hasSpecies = card.querySelector(`.sighting-row[data-species="${activeFilter}"]`);
    card.classList.toggle('hidden', !hasSpecies);
  });
  const visible = document.querySelectorAll('.trip-card:not(.hidden)').length;
  document.getElementById('feed-count').textContent = `${visible} trip${visible !== 1 ? 's' : ''}`;
  sendHeight();
}

// ── Feed ──────────────────────────────────────────────────────────────────────
function renderFeed(data) {
  const list = document.getElementById('feed-list');
  const trips = groupByTrip(data);
  document.getElementById('feed-count').textContent = `${trips.length} trip${trips.length !== 1 ? 's' : ''}`;
  if (!trips.length) { list.innerHTML = '<div class="state-msg">No sightings recorded yet.</div>'; return; }

  list.innerHTML = trips.map(([tripKey, sightings]) => {
    const tripDate = (sightings[0].trip_date || '').slice(0, 10);
    const tripPart = sightings[0].trip_part || '';
    const totalAnimals = sightings.reduce((sum, s) => sum + (parseInt(s.count) || 1), 0);
    const tallied = tallyBySpecies(sightings);
    const rows = tallied.map(([species, d]) => {
      const meta = sm(species);
      const hasGps = !!(d.lat && d.lng);
      return `<div class="sighting-row" data-trip="${tripKey}" data-species="${species}" data-has-gps="${hasGps}">
        <div class="species-icon">${meta.icon}</div>
        <div class="species-name">${species}</div>
        <div class="species-count">×${d.count}</div>
      </div>`;
    }).join('');

    const audio = tripAudioByTrip.get(tripKey);
    const audioBlock = audio ? renderAudioPlayer(audio) : '';

    // Replay needs at least two sightings with both a GPS pin and a logged
    // time. Backfill from migration 0016 gives older trips a synthetic
    // spread; new trips get the captain's real per-sighting times.
    const replayable = sightings.filter(s => s.lat && s.lng && s.sighting_time).length;
    const replayBtn = replayable >= 2
      ? `<button class="trip-replay-btn" type="button" aria-label="Replay this trip" data-replay-trip="${tripKey}">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>`
      : '';

    return `<div class="trip-card" data-trip="${tripKey}">
      <div class="trip-date-header" data-trip="${tripKey}">
        <div class="trip-date-label">
          <span class="active-indicator"></span>
          ${fmtDate(tripDate)}${tripPart ? ' · ' + tripPart : ''}
        </div>
        <div class="trip-date-right">
          <div class="trip-summary">${tallied.length} species &middot; ${totalAnimals} animals</div>
          ${replayBtn}
          <button class="trip-share-btn" type="button" aria-label="Share this trip" data-share-trip="${tripKey}">
            <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          </button>
        </div>
      </div>
      ${audioBlock}
      <div class="trip-sightings">${rows}</div>
    </div>`;
  }).join('');

  // Share button on each trip card — opens the iOS / Android / desktop
  // native share sheet via Web Share API (Safari, Chrome, Edge). Firefox
  // falls back to clipboard + a small toast. stopPropagation so the
  // share click doesn't also toggle the trip-header selection.
  list.querySelectorAll('.trip-share-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      shareTrip(btn.dataset.shareTrip);
    });
  });

  // Replay button on each trip card — animates a polyline pin-by-pin in the
  // order the captain logged the sightings.
  list.querySelectorAll('.trip-replay-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      replayTrip(btn.dataset.replayTrip);
    });
  });

  // Trip header click — show only that trip's pins
  list.querySelectorAll('.trip-date-header').forEach(header => {
    header.addEventListener('click', () => {
      const tripKey = header.dataset.trip;
      if (activeTripKey === tripKey) {
        // Deselect
        activeTripKey = null;
        header.classList.remove('active-trip');
        document.querySelectorAll('.trip-card').forEach(c => c.classList.remove('selected', 'hidden'));
      } else {
        activeTripKey = tripKey;
        document.querySelectorAll('.trip-date-header').forEach(h => h.classList.remove('active-trip'));
        document.querySelectorAll('.trip-card').forEach(c => { c.classList.remove('selected'); c.classList.remove('hidden'); });
        header.classList.add('active-trip');
        header.closest('.trip-card').classList.add('selected');
        // Pan map to this trip's center (only when the map is rendered)
        if (map) {
          const dm = allData.filter(s => s.trip_id === tripKey && s.lat && s.lng);
          if (dm.length) {
            const lats = dm.map(s => +s.lat), lngs = dm.map(s => +s.lng);
            map.panTo([(Math.min(...lats)+Math.max(...lats))/2, (Math.min(...lngs)+Math.max(...lngs))/2], { animate: true });
          }
        }
      }
      refreshMarkers();
    });
  });

  // Sighting row click — zoom to specific marker
  list.querySelectorAll('.sighting-row').forEach(row => {
    row.addEventListener('click', () => {
      if (row.dataset.hasGps !== 'true') return;
      list.querySelectorAll('.sighting-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');
      // Set active trip and refresh
      activeTripKey = row.dataset.trip;
      document.querySelectorAll('.trip-date-header').forEach(h => h.classList.remove('active-trip'));
      const header = list.querySelector(`.trip-date-header[data-trip="${row.dataset.trip}"]`);
      if (header) header.classList.add('active-trip');
      refreshMarkers();
      // Pan to this specific marker (no-op when the map is hidden)
      if (map) {
        const m = markers.find(x => x._tripKey === row.dataset.trip && x._species === row.dataset.species);
        if (m) { map.panTo(m.getLatLng(), { animate: true }); setTimeout(() => m.openPopup(), 300); }
      }
    });
  });

  // Wire up the custom audio players that just got painted into trip cards
  bindAudioPlayers(list);

  sendHeight();
}

function sendHeight() {
  window.parent.postMessage({ iframeHeight: document.body.scrollHeight }, '*');
}

// ── Share ─────────────────────────────────────────────────────────────
// Visitor on the embed taps the share icon on a trip card → iOS / Android
// native share sheet opens with a deep-link to the same widget filtered
// to that trip. Recipient opens the link, lands on the widget already
// pointed at that trip with the audio one tap away. Each share is a free
// referral for the operator.

function shareUrlForTrip(tripKey) {
  // Prefer the operator's own widget page (configured per-operator as
  // widget_host_url) so the share recipient lands on their branded site
  // with their nav + Book Now + SEO, not the bare vercel widget URL.
  // Falls back to /api/sightings on our domain when widget_host_url is
  // unset (any new operator pre-config or an operator with no public
  // page yet).
  var hostUrl = OP && OP.widget_host_url;
  if (hostUrl) {
    var sep = hostUrl.indexOf('?') === -1 ? '?' : '&';
    return hostUrl + sep + 'trip=' + encodeURIComponent(tripKey);
  }
  var slug = (OP && OP.slug) || 'enocean';
  return location.origin + '/api/sightings?op=' + encodeURIComponent(slug) +
                           '&trip=' + encodeURIComponent(tripKey);
}

function buildShareText(tripKey) {
  var tally = tallyBySpecies(allData.filter(s => s.trip_id === tripKey));
  if (!tally.length) return '';
  var topSpecies = tally.slice(0, 3).map(t => t[0]).join(', ');
  var extra = tally.length > 3 ? ' and more' : '';
  return tally.length + ' species seen — ' + topSpecies + extra +
         '. Listen to the captain\\u2019s notes from this trip.';
}

async function shareTrip(tripKey) {
  var url = shareUrlForTrip(tripKey);
  var sel = allData.find(s => s.trip_id === tripKey) || {};
  var title = 'Sightings · ' + fmtDate((sel.trip_date || '').slice(0, 10)) +
              (sel.trip_part ? ' ' + sel.trip_part : '');
  var text  = buildShareText(tripKey);

  if (navigator.share) {
    try {
      await navigator.share({ title: title, text: text, url: url });
    } catch (err) {
      // User cancelled the share sheet — silent. Other errors fall
      // through to the clipboard path so the link isn't lost.
      if (err && err.name === 'AbortError') return;
      copyShareUrl(url);
    }
    return;
  }
  copyShareUrl(url);
}

function copyShareUrl(url) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(
      () => showShareToast('Link copied'),
      () => showShareToast('Press ⌘/Ctrl + C to copy: ' + url),
    );
  } else {
    showShareToast(url);
  }
}

var _shareToastTimer = null;
function showShareToast(message) {
  var existing = document.getElementById('share-toast');
  if (existing) existing.remove();
  var t = document.createElement('div');
  t.id = 'share-toast';
  t.className = 'share-toast';
  t.textContent = message;
  document.body.appendChild(t);
  // Force a reflow so the .show transition actually fires
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(_shareToastTimer);
  _shareToastTimer = setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 220);
  }, 2200);
}

// ── Replay ─────────────────────────────────────────────────────────────
// Visitor taps ▶ on a trip card → the map zooms to that trip and a teal
// polyline draws pin-to-pin in the order the captain logged the sightings
// (sighting_time). Existing pins start hidden and pop in as the line
// reaches each one. ~8 seconds end-to-end regardless of trip length.
const REPLAY_DURATION_MS = 8000;
let _replayInFlight = false;

async function replayTrip(tripKey, opts) {
  const silent = opts && opts.silent;
  if (!map || _replayInFlight) return;
  const ordered = allData
    .filter(s => s.trip_id === tripKey && s.lat && s.lng && s.sighting_time)
    .sort((a, b) => String(a.sighting_time).localeCompare(String(b.sighting_time)));
  if (ordered.length < 2) { if (!silent) showShareToast('Not enough sightings to replay'); return; }
  _replayInFlight = true;
  let line = null;
  try {
    // Focus this trip and sync the card UI to the new selection (same
    // visual state as a header click).
    activeTripKey = tripKey;
    refreshMarkers();
    document.querySelectorAll('.trip-date-header').forEach(h => h.classList.remove('active-trip'));
    document.querySelectorAll('.trip-card').forEach(c => { c.classList.remove('selected'); c.classList.remove('hidden'); });
    const header = document.querySelector('.trip-date-header[data-trip="' + tripKey + '"]');
    if (header) { header.classList.add('active-trip'); header.closest('.trip-card').classList.add('selected'); }

    // Hide this trip's pins so they reveal in sequence.
    const tripMarkers = markers.filter(m => m._tripKey === tripKey);
    tripMarkers.forEach(m => setMarkerOpacity(m, 0));

    // Anchor list: every sighting in order, then the home port if known —
    // so the line ends at the dock instead of trailing off at the last pin.
    const homePort = (OP && OP.home_port) || null;
    const anchors = ordered.map(s => [+s.lat, +s.lng]);
    if (homePort) anchors.push([homePort.lat, homePort.lng]);

    // Frame the whole path (sightings + harbor) and let the pan/zoom settle.
    map.fitBounds(L.latLngBounds(anchors), { padding: [40, 40], maxZoom: 13, animate: true });
    await wait(350);

    line = L.polyline([], {
      color: '#0fbfb1', weight: 3, opacity: 0.9, lineCap: 'round', lineJoin: 'round',
    }).addTo(map);

    line.addLatLng(anchors[0]);
    revealMarkerAt(tripMarkers, ordered[0]);

    const segMs = REPLAY_DURATION_MS / Math.max(anchors.length - 1, 1);
    for (let i = 1; i < anchors.length; i++) {
      const from = anchors[i - 1];
      const to   = anchors[i];
      line.addLatLng(from);  // "head" point we'll move toward `to`
      await animatePolylineHead(line, from, to, segMs);
      // Reveal the marker only when the anchor is a sighting (not the
      // harbor, which has no marker).
      if (i < ordered.length) revealMarkerAt(tripMarkers, ordered[i]);
    }
    // Linger so the finished path stays visible for a beat, then clear.
    await wait(1200);
  } finally {
    if (line) line.remove();
    _replayInFlight = false;
  }
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2) / 2; }

function animatePolylineHead(line, from, to, ms) {
  return new Promise(resolve => {
    const start = performance.now();
    function frame(now) {
      const t = Math.min(1, (now - start) / ms);
      const k = easeInOut(t);
      const lat = from[0] + (to[0] - from[0]) * k;
      const lng = from[1] + (to[1] - from[1]) * k;
      const pts = line.getLatLngs();
      pts[pts.length - 1] = L.latLng(lat, lng);
      line.setLatLngs(pts);
      if (t < 1) requestAnimationFrame(frame);
      else resolve();
    }
    requestAnimationFrame(frame);
  });
}

// Leaflet's L.Marker uses setOpacity; L.CircleMarker / Path use setStyle.
// One helper that handles both keeps the replay code marker-type-agnostic.
function setMarkerOpacity(marker, v) {
  if (marker.setStyle) marker.setStyle({ opacity: v, fillOpacity: v * 0.95 });
  else if (marker.setOpacity) marker.setOpacity(v);
}

function revealMarkerAt(tripMarkers, s) {
  const lat = +s.lat, lng = +s.lng;
  const target = tripMarkers.find(m => {
    const ml = m.getLatLng();
    return Math.abs(ml.lat - lat) < 1e-6 && Math.abs(ml.lng - lng) < 1e-6;
  });
  if (!target) return;
  const start = performance.now();
  const ms = 220;
  function frame(now) {
    const t = Math.min(1, (now - start) / ms);
    setMarkerOpacity(target, t);
    if (t < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ── Deep-link ─────────────────────────────────────────────────────────
// When the widget is opened with ?trip=<trip id> (shared link), we seed
// activeTripKey from the URL on init so the right trip is pre-selected
// and its pins are the only ones on the map. Called after renderFeed
// paints the trip cards (the click-handlers exist by then).
function applyInitialTripFromUrl() {
  try {
    var params = new URLSearchParams(window.location.search);
    var trip = params.get('trip');
    if (!trip) return;
    // Only honor it if we actually have data for that trip — otherwise
    // a stale link from before a re-sync would orphan the user on an
    // empty view.
    var hasIt = allData.some(s => s.trip_id === trip);
    if (!hasIt) return;
    activeTripKey = trip;
    var header = document.querySelector('.trip-date-header[data-trip="' + trip + '"]');
    if (header) {
      document.querySelectorAll('.trip-date-header').forEach(h => h.classList.remove('active-trip'));
      header.classList.add('active-trip');
      header.closest('.trip-card').classList.add('selected');
      // Scroll the shared trip into view so the visitor sees it without
      // hunting. block:'start' keeps the trip header just below the map.
      header.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    refreshMarkers();
    // Pan map to this trip's center (only when the map is rendered)
    if (map) {
      var pins = allData.filter(s => s.trip_id === trip && s.lat && s.lng);
      if (pins.length) {
        var lats = pins.map(s => +s.lat), lngs = pins.map(s => +s.lng);
        map.panTo([(Math.min(...lats)+Math.max(...lats))/2, (Math.min(...lngs)+Math.max(...lngs))/2], { animate: true });
      }
    }
  } catch (e) { /* malformed URL params — ignore */ }
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  // Guard against unresolved operators (typo in the ?op= slug, or no operators
  // table row matching). Without this, the queries below would filter on
  // operator_id=eq.null, which PostgREST evaluates to "match nothing" — still
  // safer than the old unfiltered query, but the captain deserves a clearer
  // signal than "No data yet" when their slug is wrong.
  if (!OPERATOR_ID) {
    document.getElementById('feed-list').innerHTML = `<div class="state-msg">Operator not found.<br><small style="color:#555">Check the <code>?op=&lt;slug&gt;</code> in the embed URL.</small></div>`;
    document.getElementById('status-text').textContent = 'No operator';
    sendHeight();
    return;
  }
  try {
    [allData, tripAudioByTrip] = await Promise.all([fetchSightings(), fetchTripAudio()]);
    renderNowBanner(allData);
    renderLegend(allData);
    renderSegmentedRail(allData);
    refreshMarkers();
    renderFeed(allData);
    document.getElementById('status-text').textContent =
      allData.length ? fmtDottedDate(allData[0].trip_date) : 'No data yet';
    // If the URL has ?trip=<trip id> (shared link), seed the selection
    // AFTER renderFeed has painted the trip cards — its click handlers
    // are wired by then, the .trip-date-header element exists, and we
    // can scroll to it cleanly.
    applyInitialTripFromUrl();

    // No shared-link trip in the URL? Default to the newest trip so the
    // map opens focused on one trip instead of every pin ever — the full
    // feed is still scrollable for visitors who want older trips.
    if (!activeTripKey && allData.length) {
      const newest = groupByTrip(allData)[0];
      if (newest) {
        activeTripKey = newest[0];
        const header = document.querySelector('.trip-date-header[data-trip="' + activeTripKey + '"]');
        if (header) {
          header.classList.add('active-trip');
          header.closest('.trip-card').classList.add('selected');
        }
        refreshMarkers();
      }
    }

    // Auto-play the replay animation for whichever trip ended up selected
    // — shared-link visitors see the shared trip play, first-time visitors
    // see the most recent trip. Silent so a trip too small to replay just
    // sits there instead of toasting on page load.
    if (activeTripKey) {
      replayTrip(activeTripKey, { silent: true }).catch(() => {});
    }

    sendHeight();
  } catch (err) {
    document.getElementById('feed-list').innerHTML = `<div class="state-msg">Could not load sightings.<br><small style="color:#555">${err.message}</small></div>`;
    document.getElementById('status-text').textContent = 'Data unavailable';
    sendHeight();
  }
})();

window.addEventListener('load', sendHeight);
new MutationObserver(sendHeight).observe(document.body, { childList: true, subtree: true });
</script>
</body>
